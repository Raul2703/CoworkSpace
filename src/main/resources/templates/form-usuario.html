<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Usuario')}"></th:block>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<section class="py-5">

		<div class="container">

			<div class="row justify-content-center">

				<div class="col-lg-7">

					<div class="card border-0 shadow-sm rounded-4">

						<div class="card-body p-5">

							<div class="text-center mb-5">

								<h1 class="fw-bold">
									Usuario
								</h1>

								<p class="text-secondary">
									A&ntilde;adir o editar usuario
								</p>

							</div>

							<form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

								<input type="hidden" th:field="*{id}">

								<div class="mb-4">

									<label class="form-label">
										Nombre
									</label>

									<input type="text" th:field="*{nombre}" class="form-control rounded-3">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('nombre')}"
										th:errors="*{nombre}">
									</div>

								</div>

								<div class="mb-4">

									<label class="form-label">
										Email
									</label>

									<input type="email" th:field="*{email}" class="form-control rounded-3">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('email')}"
										th:errors="*{email}">
									</div>

								</div>

								<div class="mb-4">

									<label class="form-label">
										Tel&eacute;fono
									</label>

									<input type="text" th:field="*{telefono}" class="form-control rounded-3">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('telefono')}"
										th:errors="*{telefono}">
									</div>

								</div>

								<div class="mb-4">

									<label for="password" class="form-label">
										Contrase&ntilde;a
									</label>

									<input id="password" type="password" name="password" class="form-control rounded-3"
										placeholder="Dejar en blanco para mantener la actual">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('password')}"
										th:errors="*{password}">
									</div>

								</div>

								<div class="mb-4">

									<label class="form-label">
										Rol
									</label>

									<select th:field="*{rol}" class="form-select rounded-3">
										<option value="USER">Usuario</option>
										<option value="ADMIN">Administrador</option>
									</select>

								</div>

								<div class="d-flex gap-3 flex-wrap">

									<button type="submit" class="btn btn-dark rounded-pill px-4">

										<i class="bi bi-floppy me-2"></i>

										Guardar

									</button>

									<a th:href="@{/usuarios}" class="btn btn-outline-secondary rounded-pill px-4">
										Cancelar
									</a>

								</div>

							</form>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
