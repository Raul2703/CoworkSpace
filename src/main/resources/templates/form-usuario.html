<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nuevo Usuario</title>

	<link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" rel="stylesheet">
</head>

<body>

	<div class="page">
		<div class="page-wrapper">
			<div class="container-xl py-5">

				<div class="card">
					<div class="card-header">
						<h3 class="card-title">Nuevo Usuario</h3>
					</div>

					<div class="card-body">
						<form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

							<div class="mb-3">
								<label class="form-label">Nombre</label>
								<input type="text" th:field="*{nombre}" class="form-control">

								<div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">
								</div>
							</div>

							<div class="mb-3">
								<label class="form-label">Email</label>
								<input type="email" th:field="*{email}" class="form-control">

								<div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
								</div>
							</div>

							<div class="mb-3">
								<label class="form-label">Teléfono</label>
								<input type="text" th:field="*{telefono}" class="form-control">

								<div class="text-danger" th:if="${#fields.hasErrors('telefono')}"
									th:errors="*{telefono}"></div>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-primary">Guardar</button>
								<a th:href="@{/usuarios}" class="btn btn-secondary">Volver</a>
							</div>

						</form>
					</div>
				</div>

			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>

</body>

</html>
