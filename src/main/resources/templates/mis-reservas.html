<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mis Reservas</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
		<div class="container">

			<a class="navbar-brand fw-bold fs-2" th:href="@{/}">
				Cowork<span class="text-primary">Space</span>
			</a>

			<div class="ms-auto">
				<div class="dropdown">
					<button class="btn btn-outline-dark rounded-pill px-4 dropdown-toggle" type="button"
						data-bs-toggle="dropdown">
						<i class="bi bi-person me-2"></i>
						<span sec:authentication="name"></span>
					</button>
					<ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">
						<li sec:authorize="hasRole('ADMIN')">
							<a th:href="@{/admin}" class="dropdown-item py-2">
								<i class="bi bi-speedometer2 me-2"></i>
								Panel admin
							</a>
						</li>
						<li sec:authorize="hasRole('ADMIN')">
							<hr class="dropdown-divider">
						</li>
						<li>
							<form th:action="@{/logout}" method="post">
								<button type="submit" class="dropdown-item py-2">
									<i class="bi bi-box-arrow-right me-2"></i>
									Cerrar sesión
								</button>
							</form>
						</li>
					</ul>
				</div>
			</div>

		</div>
	</nav>

	<section class="py-5">
		<div class="container">

			<div class="d-flex justify-content-between align-items-center mb-4">
				<div>
					<h1 class="display-5 fw-bold mb-1">Mis reservas</h1>
					<p class="text-secondary mb-0">Aquí puedes ver todas tus reservas activas.</p>
				</div>
				<a th:href="@{/reservas/nuevo}" class="btn btn-dark rounded-pill px-4">
					<i class="bi bi-plus-lg me-2"></i>
					Nueva reserva
				</a>
			</div>


			<div th:if="${#lists.isEmpty(reservas)}" class="card border-0 shadow-sm rounded-4">
				<div class="card-body p-5 text-center">
					<i class="bi bi-calendar-x text-secondary display-3 mb-4 d-block"></i>
					<h4 class="fw-bold mb-2">No tienes reservas aún</h4>
					<p class="text-secondary mb-4">Cuando realices una reserva aparecerá aquí.</p>
					<a th:href="@{/reservas/nuevo}" class="btn btn-dark rounded-pill px-4">
						<i class="bi bi-plus-lg me-2"></i>
						Hacer mi primera reserva
					</a>
				</div>
			</div>


			<div th:unless="${#lists.isEmpty(reservas)}" class="card border-0 shadow-sm rounded-4">
				<div class="card-body p-0">
					<div class="table-responsive">
						<table class="table table-hover align-middle mb-0">
							<thead class="table-light">
								<tr>
									<th class="ps-4 py-3">#</th>
									<th>Nombre</th>
									<th>Fecha</th>
									<th>Horario</th>
									<th>Espacios</th>
									<th class="pe-4">Precio total</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="reserva, iter : ${reservas}">

									<td class="ps-4">
										<span class="badge bg-light text-dark border fw-semibold"
											th:text="${iter.index + 1}"></span>
									</td>

									<td class="fw-semibold" th:text="${reserva.nombreReserva}"></td>

									<td>
										<span class="text-secondary" th:text="${reserva.fecha}"></span>
									</td>

									<td>
										<span class="badge bg-light text-dark border rounded-pill px-3 py-2">
											<i class="bi bi-clock me-1"></i>
											<span th:text="${reserva.horaInicio}"></span>
											–
											<span th:text="${reserva.horaFin}"></span>
										</span>
									</td>

									<td>
										<span th:if="${#lists.isEmpty(reserva.reservasEspacios)}"
											class="text-secondary fst-italic">Sin espacio</span>
										<div th:unless="${#lists.isEmpty(reserva.reservasEspacios)}"
											class="d-flex flex-wrap gap-1">
											<span th:each="re : ${reserva.reservasEspacios}"
												class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill px-3 py-1"
												th:text="${re.espacio.nombre}">
											</span>
										</div>
									</td>

									<td class="pe-4 fw-bold">
										<span th:text="${reserva.precioTotal}"></span>€
									</td>

								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>


			<div th:unless="${#lists.isEmpty(reservas)}" class="mt-4">
				<div
					class="card border-0 shadow-sm rounded-4 px-4 py-3 d-inline-flex flex-row align-items-center gap-3">
					<div class="bg-primary bg-opacity-10 rounded-circle p-3">
						<i class="bi bi-calendar-check text-primary fs-5"></i>
					</div>
					<div>
						<div class="text-secondary small">Total reservas</div>
						<div class="fw-bold fs-5" th:text="${#lists.size(reservas)}"></div>
					</div>
				</div>
			</div>

		</div>
	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
