<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Espacios</title>
</head>

<body>

	<h1>Lista de Espacios</h1>

	<table border="1">

		<thead>
			<tr>
				<th>ID</th>
				<th>Nombre</th>
				<th>Capacidad</th>
				<th>Precio</th>
			</tr>
		</thead>

		<tbody>
			<tr th:each="espacio : ${espacios}">
				<td th:text="${espacio.id}"></td>
				<td th:text="${espacio.nombre}"></td>
				<td th:text="${espacio.capacidad}"></td>
				<td th:text="${espacio.precio}"></td>
			</tr>
		</tbody>

	</table>

</body>

</html>
