<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

	<th:block th:replace="~{fragments/layout :: headContent('Espacios')}"></th:block>

</head>

<body style="background-color: #f8fafc;">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<section class="py-5">

		<div class="container">

			<div class="mb-5">

				<h1 class="display-4 fw-bold">
					Todos los espacios
				</h1>

				<p class="text-secondary fs-5">
					Explora todos los espacios disponibles.
				</p>

			</div>

			<div class="row g-4">

				<div class="col-lg-3 col-md-6" th:each="espacio : ${espacios}">

					<div class="card border-0 shadow-sm rounded-5 overflow-hidden h-100">

						<img th:src="${
							espacio.nombre.equalsIgnoreCase('Puesto flexible')         ? '/img/puestoFlexible.png' :
							espacio.nombre.equalsIgnoreCase('Sala pequeña reuniones')  ? '/img/salaDeReunionesPequeña.png' :
							espacio.nombre.equalsIgnoreCase('Oficina individual')      ? '/img/oficinaIndividual.png' :
							espacio.nombre.equalsIgnoreCase('Oficina premium')         ? '/img/salaPremium.jpg' :
							espacio.nombre.equalsIgnoreCase('Sala conferencias')       ? '/img/salaDeReuniones.png' :
							espacio.nombre.equalsIgnoreCase('Zona podcast')            ? '/img/salaPodcast.jpg' :
							espacio.nombre.equalsIgnoreCase('Estudio creativo')        ? '/img/salaCreativa.jpg' :
							espacio.nombre.equalsIgnoreCase('Zona equipos')            ? '/img/zonaDeEquipos.jpg' :
							'/img/oficinaCooperativa.png'
						}" class="card-img-top" style="height: 240px; object-fit: cover;" alt="Espacio coworking">

						<div class="card-body p-4 d-flex flex-column">

							<div class="d-flex justify-content-between align-items-center mb-3">

								<span class="fw-semibold text-dark">

									<span th:text="${espacio.precio}"></span>€/hora

								</span>

							</div>

							<h4 class="fw-bold mb-3" th:text="${espacio.nombre}">
							</h4>

							<p class="text-secondary mb-4">

								Capacidad para
								<span th:text="${espacio.capacidad}"></span>
								personas.

							</p>

							<div class="mt-auto">

								<a th:href="@{/reservas/nuevo}" class="btn btn-dark rounded-pill w-100">

									Reservar

								</a>

							</div>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
