<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

	<th:block th:replace="~{fragments/layout :: headContent('Espacios')}"></th:block>

</head>

<body class="d-flex flex-column min-vh-100" style="background-color: #f8fafc;">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

	<section class="py-5">

		<div class="container">

			<div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-5">

				<div>

					<h1 class="display-4 fw-bold mb-1">
						Todos los espacios
					</h1>

					<p class="text-secondary fs-5 mb-0">
						Explora todos los espacios disponibles.
					</p>

				</div>

				<a th:href="@{/espacios/nuevo}" class="btn btn-dark rounded-pill px-4" sec:authorize="hasRole('ADMIN')">
					<i class="bi bi-plus-lg me-2"></i>Nuevo espacio
				</a>

			</div>

			<form th:action="@{/espacios}" method="get" class="card border-0 shadow-sm rounded-4 mb-5">

				<div class="card-body p-4">

					<div class="row g-3 align-items-end">

						<div class="col-lg-5">

							<label for="busqueda" class="form-label fw-semibold">
								Nombre del espacio
							</label>

							<input id="busqueda" name="busqueda" type="text" class="form-control rounded-pill"
								placeholder="Oficina, sala, zona..." th:value="${busqueda}">

						</div>

						<div class="col-md-6 col-lg-3">

							<label for="capacidadMinima" class="form-label fw-semibold">
								Capacidad minima
							</label>

							<input id="capacidadMinima" name="capacidadMinima" type="number" min="1"
								class="form-control rounded-pill" placeholder="Personas" th:value="${capacidadMinima}">

						</div>

						<div class="col-md-6 col-lg-2">

							<label for="precioMaximo" class="form-label fw-semibold">
								Precio maximo
							</label>

							<input id="precioMaximo" name="precioMaximo" type="number" min="0" step="0.5"
								class="form-control rounded-pill" placeholder="Euros" th:value="${precioMaximo}">

						</div>

						<div class="col-lg-2 d-grid gap-2">

							<button type="submit" class="btn btn-dark rounded-pill">
								Filtrar
							</button>

							<a th:href="@{/espacios}" class="btn btn-outline-secondary rounded-pill">
								Limpiar
							</a>

						</div>

					</div>

				</div>

			</form>

			<div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-4">

				<p class="text-secondary mb-0">
					Mostrando
					<span class="fw-semibold text-dark" th:text="${totalEspaciosFiltrados}">0</span>
					espacios
				</p>

				<a th:if="${filtrosActivos}" th:href="@{/espacios}"
					class="btn btn-outline-secondary btn-sm rounded-pill px-3">
					Quitar filtros
				</a>

			</div>

			<div th:if="${#lists.isEmpty(espacios)}" class="card border-0 shadow-sm rounded-4 mb-4">

				<div class="card-body p-4 text-secondary">
					No se han encontrado espacios con esos filtros.
				</div>

			</div>

			<div class="row g-4">

				<div class="col-lg-3 col-md-6" th:each="espacio : ${espacios}">

					<div class="card border-0 shadow-sm rounded-5 overflow-hidden h-100">

						<img th:src="${
							espacio.nombre.equalsIgnoreCase('Puesto flexible')         ? '/img/puestoFlexible.png' :
							espacio.nombre.equalsIgnoreCase('Sala pequeña reuniones')  ? '/img/salaDeReunionesPequeña.png' :
							espacio.nombre.equalsIgnoreCase('Oficina individual')      ? '/img/oficinaIndividual.png' :
							espacio.nombre.equalsIgnoreCase('Oficina premium')         ? '/img/salaPremium.jpg' :
							espacio.nombre.equalsIgnoreCase('Sala conferencias')       ? '/img/salaDeReuniones.png' :
							espacio.nombre.equalsIgnoreCase('Zona podcast')            ? '/img/salaPodcast.jpg' :
							espacio.nombre.equalsIgnoreCase('Estudio creativo')        ? '/img/salaCreativa.jpg' :
							espacio.nombre.equalsIgnoreCase('Zona equipos')            ? '/img/zonaDeEquipos.jpg' :
							'/img/oficinaCooperativa.png'
						}" class="card-img-top" style="height: 240px; object-fit: cover;" alt="Espacio coworking">

						<div class="card-body p-4 d-flex flex-column">

							<div class="d-flex justify-content-between align-items-center mb-3">

								<span class="fw-semibold text-dark">

									<span th:text="${espacio.precio}"></span>€/hora

								</span>

							</div>

							<h4 class="fw-bold mb-3" th:text="${espacio.nombre}">
							</h4>

							<p class="text-secondary mb-4">

								Capacidad para
								<span th:text="${espacio.capacidad}"></span>
								personas.

							</p>

							<div class="mt-auto d-grid gap-2">

								<a th:href="@{/reservas/nuevo}" class="btn btn-dark rounded-pill w-100"
									sec:authorize="hasRole('USER')">
									Reservar
								</a>

								<a th:href="@{/espacios/editar/{id}(id=${espacio.id})}"
									class="btn btn-outline-dark rounded-pill w-100" sec:authorize="hasRole('ADMIN')">
									<i class="bi bi-pencil me-1"></i>Editar
								</a>

								<a th:href="@{/espacios/borrar/{id}(id=${espacio.id})}"
									class="btn btn-dark rounded-pill w-100 js-confirm-delete"
									data-confirm-message="¿Seguro que quieres borrar este espacio?"
									sec:authorize="hasRole('ADMIN')">
									<i class="bi bi-trash me-1"></i>Borrar
								</a>

							</div>

						</div>

					</div>

				</div>

			</div>

			<div class="mt-4" sec:authorize="hasRole('ADMIN')">

				<a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill px-4">
					Volver al panel
				</a>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<script src="/js/confirm-delete.js"></script>
	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
