<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Espacios</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div class="container mt-5">

		<h1 class="mb-4">Lista de Espacios</h1>

		<a th:href="@{/espacios/nuevo}" class="btn btn-primary mb-3">Nuevo Espacio</a>

		<table class="table table-striped table-bordered table-hover">

			<thead class="table-dark">
				<tr>
					<th>ID</th>
					<th>Nombre</th>
					<th>Capacidad</th>
					<th>Precio</th>
				</tr>
			</thead>

			<tbody>

				<tr th:each="espacio : ${espacios}">
					<td th:text="${espacio.id}"></td>
					<td th:text="${espacio.nombre}"></td>
					<td th:text="${espacio.capacidad}"></td>
					<td th:text="${espacio.precio}"></td>
				</tr>

			</tbody>

		</table>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
