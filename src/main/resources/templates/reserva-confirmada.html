<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Reserva confirmada')}"></th:block>
</head>

<body class="bg-light">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

	<section class="py-5">

		<div class="container py-lg-5">

			<div class="row justify-content-center">

				<div class="col-lg-6">

					<div class="card border-0 shadow-sm rounded-4">

						<div class="card-body p-5 text-center">

							<i class="bi bi-check-circle-fill text-success display-1 mb-4 d-block"></i>

							<h1 class="fw-bold mb-3">
								Reserva confirmada
							</h1>

							<p class="text-secondary fs-5 mb-4">
								Tu reserva se ha registrado correctamente.
							</p>

							<div class="d-flex justify-content-center gap-3 flex-wrap">

								<a th:href="@{/mis-reservas}" class="btn btn-dark rounded-pill px-4">
									Ver mis reservas
								</a>

								<a th:href="@{/reservas/nuevo}" class="btn btn-outline-dark rounded-pill px-4">
									Hacer otra reserva
								</a>

							</div>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
