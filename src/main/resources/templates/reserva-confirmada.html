<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reserva confirmada</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<section class="min-vh-100 d-flex align-items-center">

		<div class="container">

			<div class="row justify-content-center">

				<div class="col-lg-6">

					<div class="card border-0 shadow-sm rounded-5">

						<div class="card-body p-5 text-center">

							<i class="bi bi-check-circle-fill text-success display-1 mb-4 d-block"></i>

							<h1 class="fw-bold mb-3">
								Reserva confirmada
							</h1>

							<p class="text-secondary fs-5 mb-4">
								Tu reserva se ha registrado correctamente.
							</p>

							<div class="d-flex justify-content-center gap-3 flex-wrap">

								<a th:href="@{/mis-reservas}" class="btn btn-dark rounded-pill px-4">
									Ver mis reservas
								</a>

								<a th:href="@{/reservas/nuevo}" class="btn btn-outline-dark rounded-pill px-4">
									Hacer otra reserva
								</a>

							</div>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
