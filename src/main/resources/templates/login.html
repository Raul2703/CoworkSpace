<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Iniciar sesión | CoworkSpace</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body style="font-family: 'Manrope', sans-serif; overflow: hidden;">

	<nav class="navbar navbar-expand-lg position-absolute top-0 start-0 w-100 py-4 z-3">

		<div class="container">

			<a class="navbar-brand fw-bold fs-2 text-white" th:href="@{/}">

				Cowork<span class="text-primary">Space</span>

			</a>

			<a th:href="@{/}" class="btn btn-outline-light rounded-pill px-4">

				Volver

			</a>

		</div>

	</nav>

	<section class="vh-100 position-relative overflow-hidden">

		<img th:src="@{/img/fondoLogin.png}" class="position-absolute top-0 start-0 w-100 h-100"
			style="object-fit: cover;" alt="Cowork background">

		<div class="position-absolute top-0 start-0 w-100 h-100 bg-dark" style="opacity: 0.45;"></div>

		<div class="container position-relative z-2 h-100">

			<div class="row h-100 align-items-center justify-content-end">

				<div class="col-lg-5 col-xl-4">

					<div class="rounded-5 border border-light p-5" style="
                        background: rgba(0,0,0,0.15);
                        backdrop-filter: blur(2px);
                        -webkit-backdrop-filter: blur(2px);
                     ">

						<div class="mb-5">

							<h1 class="fw-bold display-5 text-white mb-3">

								Accede a CoworkSpace

							</h1>

							<p class="text-white-50 fs-5 mb-0">

								Inicia sesión para continuar

							</p>

						</div>

						<div th:if="${param.error}" class="alert alert-danger rounded-4">

							Usuario o contraseña incorrectos.

						</div>

						<div th:if="${param.logout}" class="alert alert-success rounded-4">

							Sesión cerrada correctamente.

						</div>

						<form th:action="@{/login}" method="post">

							<div class="mb-4">

								<label for="username" class="form-label text-white fw-semibold">

									Usuario

								</label>

								<input type="text" id="username" name="username"
									class="form-control form-control-lg rounded-4 bg-transparent text-white border-light"
									style="color: white;" placeholder="Usuario" required autofocus>

							</div>

							<div class="mb-4">

								<label for="password" class="form-label text-white fw-semibold">

									Contraseña

								</label>

								<input type="password" id="password" name="password"
									class="form-control form-control-lg rounded-4 bg-transparent text-white border-light"
									style="color: white;" placeholder="Contraseña" required>

							</div>

							<button type="submit" class="btn btn-dark btn-lg rounded-pill w-100 py-3 mb-4">

								<i class="bi bi-box-arrow-in-right me-2"></i>

								Iniciar sesión

							</button>

						</form>

						<div class="text-center">

							<p class="text-white-50 mb-0">

								¿No tienes cuenta?

								<a th:href="@{/registro}" class="text-decoration-none fw-semibold text-white">

									Regístrate

								</a>

							</p>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
