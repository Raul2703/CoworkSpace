<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Iniciar sesión</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">

		<div class="container">

			<a class="navbar-brand fw-bold fs-2" th:href="@{/}">

				Cowork<span class="text-primary">Space</span>

			</a>

		</div>

	</nav>

	<section class="py-5">

		<div class="container">

			<div class="row justify-content-center">

				<div class="col-lg-5">

					<div class="card border-0 shadow-sm rounded-4">

						<div class="card-body p-5">

							<div class="text-center mb-5">

								<h1 class="fw-bold">
									Inicia sesión
								</h1>

								<p class="text-secondary">
									Accede al panel de administración
								</p>

							</div>

							<form th:action="@{/login}" method="post">

								<div class="mb-4">

									<label class="form-label">
										Usuario
									</label>

									<input type="text" name="username" class="form-control rounded-3">

								</div>

								<div class="mb-4">

									<label class="form-label">
										Contraseña
									</label>

									<input type="password" name="password" class="form-control rounded-3">

								</div>

								<div th:if="${param.error}" class="alert alert-danger rounded-4">

									Usuario o contraseña incorrectos.

								</div>

								<div th:if="${param.logout}" class="alert alert-success rounded-4">

									Sesión cerrada correctamente.

								</div>

								<div class="d-grid">

									<button type="submit" class="btn btn-dark rounded-pill py-2">

										<i class="bi bi-box-arrow-in-right me-2"></i>

										Iniciar sesión

									</button>

								</div>

							</form>

							<div class="text-center mt-4">

								<p class="text-secondary mb-0">

									¿No tienes cuenta?

									<a th:href="@{/registro}" class="text-decoration-none fw-semibold">

										Regístrate

									</a>

								</p>

							</div>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
