<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Iniciar sesión</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

	<style>
		::placeholder {
			color: rgba(255, 255, 255, 0.75) !important;
		}
	</style>

</head>

<body style="font-family: 'Manrope', sans-serif; overflow: hidden;">

	<div class="position-relative vh-100" style="background-image: url('/img/fondoLogin.png');
            background-size: cover;
            background-position: center;">

		<div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(0,0,0,0.45);"></div>

		<nav class="navbar navbar-expand-lg navbar-dark position-absolute top-0 start-0 w-100 py-3 z-3"
			style="background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(10px);">

			<div class="container">

				<a class="navbar-brand fw-bold fs-2 text-white" th:href="@{/}">

					Cowork<span class="text-primary">Space</span>

				</a>

				<div class="collapse navbar-collapse">

					<ul class="navbar-nav mx-auto gap-4">

						<li class="nav-item">

							<a class="nav-link fw-semibold text-white" th:href="@{/}">

								Inicio

							</a>

						</li>

						<li class="nav-item">

							<a class="nav-link fw-semibold text-white" th:href="@{/espacios}">

								Espacios

							</a>

						</li>

						<li class="nav-item">

							<a class="nav-link fw-semibold text-white" th:href="@{/reservas/nuevo}">

								Reservar

							</a>

						</li>

					</ul>

					<a th:href="@{/login}" class="btn btn-light rounded-pill px-4 fw-semibold">

						Iniciar sesión

					</a>

				</div>

			</div>

		</nav>

		<div class="container-fluid position-relative z-2 h-100">

			<div class="row h-100">

				<div class="col-lg-6"></div>

				<div class="col-lg-6 d-flex align-items-center justify-content-lg-start ps-lg-5">

					<div class="text-white p-5" style="width: 100%;
                            max-width: 520px;
                            border: 1px solid rgba(255,255,255,0.2);
                            background: rgba(0,0,0,0.25);
                            backdrop-filter: blur(12px);
                            border-radius: 32px;">

						<h1 class="display-5 fw-bold mb-3">

							Accede a CoworkSpace

						</h1>

						<p class="text-white-50 fs-5 mb-5">

							Inicia sesión para gestionar reservas y espacios.

						</p>

						<form th:action="@{/login}" method="post">

							<div class="mb-4">

								<label class="form-label fw-semibold">

									Usuario

								</label>

								<input type="text" name="username" class="form-control"
									placeholder="Introduce tu usuario" style="height: 58px;
                                          border-radius: 16px;
                                          background: rgba(255,255,255,0.08);
                                          border: 1px solid rgba(255,255,255,0.2);
                                          color: white;">

							</div>

							<div class="mb-4">

								<label class="form-label fw-semibold">

									Contraseña

								</label>

								<input type="password" name="password" class="form-control"
									placeholder="Introduce tu contraseña" style="height: 58px;
                                          border-radius: 16px;
                                          background: rgba(255,255,255,0.08);
                                          border: 1px solid rgba(255,255,255,0.2);
                                          color: white;">

							</div>

							<div th:if="${param.error}" class="alert alert-danger rounded-4 border-0">

								Usuario o contraseña incorrectos.

							</div>

							<div th:if="${param.logout}" class="alert alert-success rounded-4 border-0">

								Sesión cerrada correctamente.

							</div>

							<div class="d-grid mt-4">

								<button type="submit" class="btn btn-light rounded-pill py-3 fw-semibold fs-5">

									<i class="bi bi-box-arrow-in-right me-2"></i>

									Iniciar sesión

								</button>

							</div>

						</form>

						<div class="text-center mt-4">

							<p class="text-white-50 mb-0">

								¿No tienes cuenta?

								<a th:href="@{/registro}" class="text-white fw-semibold text-decoration-none">

									Regístrate

								</a>

							</p>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
