<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Login</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100"
	style="font-family: 'Manrope', sans-serif;">

	<div class="card border-0 shadow rounded-5" style="width: 400px;">
		<div class="card-body p-5">

			<h1 class="fw-bold text-center mb-4">
				Inicia Sesión
			</h1>

			<form th:action="@{/login}" method="post">

				<div class="mb-3">
					<label class="form-label">Usuario</label>

					<input type="text" name="username" class="form-control">
				</div>

				<div class="mb-4">
					<label class="form-label">Contraseña</label>

					<input type="password" name="password" class="form-control">
				</div>

				<div class="alert alert-danger" th:if="${param.error}">
					Usuario o contraseña incorrectos
				</div>

				<button type="submit" class="btn btn-dark w-100 rounded-pill">
					Iniciar sesión
				</button>

			</form>

			<div class="text-center mt-4">

				<p class="text-secondary mb-2">
					¿Todavía no tienes cuenta?
				</p>

				<a href="#" class="text-decoration-none">
					Regístrate
				</a>

			</div>

			<div class="text-center mt-3">
				<a th:href="@{/}" class="text-decoration-none text-secondary">
					Volver a la web
				</a>
			</div>

		</div>
	</div>

</body>

</html>
