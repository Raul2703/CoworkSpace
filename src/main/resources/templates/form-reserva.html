<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

	<th:block th:replace="~{fragments/layout :: headContent('Reserva')}"></th:block>

	<style>
		input[type="date"]::-webkit-calendar-picker-indicator {
			filter: invert(1);
			opacity: 0.9;
		}
	</style>

</head>

<body>

	<section class="min-vh-100 position-relative overflow-hidden">

		<img src="/img/Reserva.png" class="position-absolute top-0 start-0 w-100 h-100 z-0"
			style="object-fit: cover; filter: brightness(0.35);">

		<div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50 z-1">
		</div>

		<nav class="navbar navbar-expand-lg navbar-dark position-absolute top-0 start-0 w-100 py-3 z-3">

			<div class="container">

				<a class="navbar-brand fw-bold fs-2" th:href="@{/}">

					Cowork<span class="text-primary">Space</span>

				</a>

				<div class="ms-auto">

					<a th:href="@{/}" class="btn btn-light rounded-pill px-4 fw-semibold">

						Volver

					</a>

				</div>

			</div>

		</nav>

		<div
			class="container position-relative min-vh-100 d-flex align-items-start align-items-lg-center justify-content-center py-5 z-2">

			<div class="row justify-content-center w-100 mt-5 mt-lg-0">

				<div class="col-lg-7 col-xl-6">

					<div class="p-4 rounded-5 border border-light border-opacity-25"
						style="background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);">

						<div class="text-center mb-3">

							<h1 class="display-5 fw-bold text-white mb-2">

								Reserva

							</h1>

							<p class="text-light opacity-75 mb-0">

								Reserva tu espacio de trabajo ideal.

							</p>

						</div>

						<form th:action="@{/reservas/guardar}" th:object="${reserva}" method="post">

							<input type="hidden" th:field="*{id}">

							<div class="row">

								<div class="col-md-6 mb-3">

									<label class="form-label text-white fw-semibold">
										Nombre reserva
									</label>

									<input type="text" th:field="*{nombreReserva}"
										class="form-control rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('nombreReserva')}"
										th:errors="*{nombreReserva}">
									</div>

								</div>

								<div class="col-md-6 mb-3">

									<label class="form-label text-white fw-semibold">
										DNI
									</label>

									<input type="text" th:field="*{dni}"
										class="form-control rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white"
										placeholder="Introduce tu DNI">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('dni')}"
										th:errors="*{dni}">
									</div>

								</div>

							</div>

							<div class="row">

								<div class="col-md-4 mb-3">

									<label class="form-label text-white fw-semibold">
										Fecha
									</label>

									<input type="date" th:field="*{fecha}"
										class="form-control rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white"
										data-bs-theme="dark">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('fecha')}"
										th:errors="*{fecha}">
									</div>

								</div>

								<div class="col-md-4 mb-3">

									<label class="form-label text-white fw-semibold">
										Hora inicio
									</label>

									<select th:field="*{horaInicio}" name="horaInicio"
										class="form-select rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white"
										data-bs-theme="dark">

										<option value="" class="text-dark bg-white">Selecciona una hora</option>

										<option value="08:00" class="text-dark bg-white">08:00</option>
										<option value="09:00" class="text-dark bg-white">09:00</option>
										<option value="10:00" class="text-dark bg-white">10:00</option>
										<option value="11:00" class="text-dark bg-white">11:00</option>
										<option value="12:00" class="text-dark bg-white">12:00</option>
										<option value="13:00" class="text-dark bg-white">13:00</option>
										<option value="14:00" class="text-dark bg-white">14:00</option>
										<option value="15:00" class="text-dark bg-white">15:00</option>
										<option value="16:00" class="text-dark bg-white">16:00</option>
										<option value="17:00" class="text-dark bg-white">17:00</option>
										<option value="18:00" class="text-dark bg-white">18:00</option>
										<option value="19:00" class="text-dark bg-white">19:00</option>
										<option value="20:00" class="text-dark bg-white">20:00</option>

									</select>

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('horaInicio')}"
										th:errors="*{horaInicio}">
									</div>

								</div>

								<div class="col-md-4 mb-3">

									<label class="form-label text-white fw-semibold">
										Hora fin
									</label>

									<select th:field="*{horaFin}" name="horaFin"
										class="form-select rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white"
										data-bs-theme="dark">

										<option value="" class="text-dark bg-white">Selecciona una hora</option>

										<option value="08:00" class="text-dark bg-white">08:00</option>
										<option value="09:00" class="text-dark bg-white">09:00</option>
										<option value="10:00" class="text-dark bg-white">10:00</option>
										<option value="11:00" class="text-dark bg-white">11:00</option>
										<option value="12:00" class="text-dark bg-white">12:00</option>
										<option value="13:00" class="text-dark bg-white">13:00</option>
										<option value="14:00" class="text-dark bg-white">14:00</option>
										<option value="15:00" class="text-dark bg-white">15:00</option>
										<option value="16:00" class="text-dark bg-white">16:00</option>
										<option value="17:00" class="text-dark bg-white">17:00</option>
										<option value="18:00" class="text-dark bg-white">18:00</option>
										<option value="19:00" class="text-dark bg-white">19:00</option>
										<option value="20:00" class="text-dark bg-white">20:00</option>

									</select>

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('horaFin')}"
										th:errors="*{horaFin}">
									</div>

								</div>

							</div>

							<div class="mb-3">

								<label class="form-label text-white fw-semibold">
									Espacio
								</label>

								<select name="espacioIds"
									class="form-select rounded-4 border-0 p-3 bg-light bg-opacity-10 text-white"
									data-bs-theme="dark">

									<option value="" class="text-dark bg-white">
										Selecciona un espacio
									</option>

									<option th:each="e : ${espacios}" th:value="${e.id}" th:text="${e.nombre}"
										th:attr="data-precio=${e.precio}" class="text-dark bg-white">
									</option>

								</select>

							</div>

							<div th:if="${errorHora}" class="alert alert-danger rounded-4 border-0">

								<i class="bi bi-exclamation-triangle me-2"></i>

								<span th:text="${errorHora}"></span>

							</div>

							<div th:if="${errorSolapamiento}" class="alert alert-danger rounded-4 border-0">

								<i class="bi bi-calendar-x me-2"></i>

								<span th:text="${errorSolapamiento}"></span>

							</div>

							<div class="mb-3 p-3 rounded-4 border border-light border-opacity-25"
								style="background: rgba(255,255,255,0.06);">

								<h5 class="text-white fw-bold mb-1">
									Precio estimado
								</h5>

								<h2 class="fw-bold text-primary mb-0">
									<span id="precioEstimado">0.00</span>€
								</h2>

							</div>

							<button type="submit" class="btn btn-light rounded-pill w-100 py-2 fw-semibold fs-5">

								<i class="bi bi-calendar-check me-2"></i>

								Guardar reserva

							</button>

						</form>

					</div>

				</div>

			</div>

		</div>

	</section>

	<script src="/js/form-reserva.js"></script>
	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
