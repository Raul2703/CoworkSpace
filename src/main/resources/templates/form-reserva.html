<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Reserva</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body style="font-family: 'Manrope', sans-serif;">

	<section class="min-vh-100 position-relative overflow-hidden">

		<img src="/img/login2.jpg" class="position-absolute top-0 start-0 w-100 h-100"
			style="object-fit: cover; filter: brightness(0.35); z-index: 1;">

		<div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50" style="z-index: 2;">
		</div>

		<nav class="navbar navbar-expand-lg navbar-dark position-relative py-4" style="z-index: 3;">

			<div class="container">

				<a class="navbar-brand fw-bold fs-1" th:href="@{/}">

					Cowork<span class="text-primary">Space</span>

				</a>

				<div class="ms-auto">

					<a th:href="@{/}" class="btn btn-light rounded-pill px-4 fw-semibold">

						Volver

					</a>

				</div>

			</div>

		</nav>

		<div class="container position-relative" style="z-index: 3;">

			<div class="row justify-content-center align-items-center min-vh-100">

				<div class="col-lg-6">

					<div class="p-5 rounded-5 border border-light border-opacity-25"
						style="background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);">

						<div class="text-center mb-5">

							<h1 class="display-3 fw-bold text-white mb-3">

								Reserva

							</h1>

							<p class="text-light fs-5 opacity-75">

								Reserva tu espacio de trabajo ideal.

							</p>

						</div>

						<form th:action="@{/reservas/guardar}" th:object="${reserva}" method="post">

							<input type="hidden" th:field="*{id}">

							<div class="mb-4">

								<label class="form-label text-white fw-semibold">
									Nombre reserva
								</label>

								<input type="text" th:field="*{nombreReserva}"
									class="form-control rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white">

							</div>

							<div class="mb-4">

								<label class="form-label text-white fw-semibold">
									Fecha
								</label>

								<input type="date" th:field="*{fecha}"
									class="form-control rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white">

							</div>

							<div class="row">

								<div class="col-md-6 mb-4">

									<label class="form-label text-white fw-semibold">
										Hora inicio
									</label>

									<select th:field="*{horaInicio}"
										class="form-select rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white">

										<option value="">Selecciona una hora</option>

										<option value="08:00">08:00</option>
										<option value="09:00">09:00</option>
										<option value="10:00">10:00</option>
										<option value="11:00">11:00</option>
										<option value="12:00">12:00</option>
										<option value="13:00">13:00</option>
										<option value="14:00">14:00</option>
										<option value="15:00">15:00</option>
										<option value="16:00">16:00</option>
										<option value="17:00">17:00</option>
										<option value="18:00">18:00</option>
										<option value="19:00">19:00</option>
										<option value="20:00">20:00</option>

									</select>

								</div>

								<div class="col-md-6 mb-4">

									<label class="form-label text-white fw-semibold">
										Hora fin
									</label>

									<select th:field="*{horaFin}"
										class="form-select rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white">

										<option value="">Selecciona una hora</option>

										<option value="08:00">08:00</option>
										<option value="09:00">09:00</option>
										<option value="10:00">10:00</option>
										<option value="11:00">11:00</option>
										<option value="12:00">12:00</option>
										<option value="13:00">13:00</option>
										<option value="14:00">14:00</option>
										<option value="15:00">15:00</option>
										<option value="16:00">16:00</option>
										<option value="17:00">17:00</option>
										<option value="18:00">18:00</option>
										<option value="19:00">19:00</option>
										<option value="20:00">20:00</option>

									</select>

								</div>

							</div>

							<div class="mb-4">

								<label class="form-label text-white fw-semibold">
									Usuario
								</label>

								<select th:field="*{usuario}"
									class="form-select rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white">

									<option value="">
										Selecciona un usuario
									</option>

									<option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nombre}">
									</option>

								</select>

							</div>

							<div class="mb-4">

								<label class="form-label text-white fw-semibold">
									Espacio
								</label>

								<select name="espacioIds"
									class="form-select rounded-4 border-0 p-3 bg-white bg-opacity-10 text-white">

									<option value="">
										Selecciona un espacio
									</option>

									<option th:each="e : ${espacios}" th:value="${e.id}" th:text="${e.nombre}">
									</option>

								</select>

							</div>

							<div class="mb-4 p-4 rounded-4 border border-light border-opacity-25"
								style="background: rgba(255,255,255,0.06);">

								<h4 class="text-white fw-bold mb-2">
									Precio estimado
								</h4>

								<h1 class="fw-bold text-primary mb-0">
									0.00€
								</h1>

							</div>

							<button type="submit" class="btn btn-light rounded-pill w-100 py-3 fw-semibold fs-5">

								<i class="bi bi-calendar-check me-2"></i>

								Guardar reserva

							</button>

						</form>

					</div>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
