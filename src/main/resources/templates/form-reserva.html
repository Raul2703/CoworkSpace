<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Reserva</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<div class="container py-5">

		<div class="row justify-content-center">

			<div class="col-lg-8">

				<div class="card border-0 shadow-sm rounded-5">

					<div class="card-body p-5">

						<div class="text-center mb-5">

							<h1 class="fw-bold display-5">
								Reserva
							</h1>

							<p class="text-secondary fs-5">
								Añadir o editar reserva
							</p>

						</div>

						<form th:action="@{/reservas/guardar}" th:object="${reserva}" method="post">

							<input type="hidden" th:field="*{id}">

							<div class="mb-4">

								<label class="form-label fw-semibold">
									Nombre reserva
								</label>

								<input type="text" th:field="*{nombreReserva}" class="form-control rounded-3 p-3">

							</div>

							<div class="mb-4">

								<label class="form-label fw-semibold">
									Fecha
								</label>

								<input type="date" th:field="*{fecha}" class="form-control rounded-3 p-3">

							</div>

							<div class="row">

								<div class="col-md-6 mb-4">

									<label class="form-label fw-semibold">
										Hora inicio
									</label>

									<select th:field="*{horaInicio}" class="form-select rounded-3 p-3">

										<option value="">
											Selecciona una hora
										</option>

										<option value="08:00">08:00</option>
										<option value="09:00">09:00</option>
										<option value="10:00">10:00</option>
										<option value="11:00">11:00</option>
										<option value="12:00">12:00</option>
										<option value="13:00">13:00</option>
										<option value="14:00">14:00</option>
										<option value="15:00">15:00</option>
										<option value="16:00">16:00</option>
										<option value="17:00">17:00</option>
										<option value="18:00">18:00</option>
										<option value="19:00">19:00</option>
										<option value="20:00">20:00</option>

									</select>

								</div>

								<div class="col-md-6 mb-4">

									<label class="form-label fw-semibold">
										Hora fin
									</label>

									<select th:field="*{horaFin}" class="form-select rounded-3 p-3">

										<option value="">
											Selecciona una hora
										</option>

										<option value="08:00">08:00</option>
										<option value="09:00">09:00</option>
										<option value="10:00">10:00</option>
										<option value="11:00">11:00</option>
										<option value="12:00">12:00</option>
										<option value="13:00">13:00</option>
										<option value="14:00">14:00</option>
										<option value="15:00">15:00</option>
										<option value="16:00">16:00</option>
										<option value="17:00">17:00</option>
										<option value="18:00">18:00</option>
										<option value="19:00">19:00</option>
										<option value="20:00">20:00</option>

									</select>

								</div>

							</div>

							<div class="mb-4">

								<label class="form-label fw-semibold">
									Usuario
								</label>

								<select th:field="*{usuario}" class="form-select rounded-3 p-3">

									<option value="">
										Selecciona un usuario
									</option>

									<option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nombre}">
									</option>

								</select>

							</div>

							<div class="mb-4">

								<label class="form-label fw-semibold">
									Espacios
								</label>

								<select name="espacioIds" class="form-select rounded-3 p-3">

									<option value="">
										Selecciona un espacio
									</option>

									<option th:each="e : ${espacios}" th:value="${e.id}" th:text="${e.nombre}"
										th:attr="data-precio=${e.precio}"
										th:selected="${reserva.reservasEspacios != null and #lists.contains(reserva.reservasEspacios.![espacio.id], e.id)}">
									</option>

								</select>

							</div>

							<div class="bg-light border rounded-4 p-4 mb-4">

								<h4 class="fw-bold mb-2">
									Precio estimado
								</h4>

								<h2 class="fw-bold text-primary mb-0">
									0.00€
								</h2>

							</div>

							<div class="d-flex gap-3">

								<button type="submit" class="btn btn-dark rounded-pill px-4 py-2">

									<i class="bi bi-floppy me-2"></i>

									Guardar

								</button>

								<a th:href="@{/reservas}" class="btn btn-outline-secondary rounded-pill px-4 py-2">

									Cancelar

								</a>

							</div>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
