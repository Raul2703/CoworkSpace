<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Reservas</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">

		<div class="container">

			<a class="navbar-brand fw-bold fs-2" th:href="@{/}">

				Cowork<span class="text-primary">Space</span>

			</a>

			<div class="ms-auto">

				<div class="dropdown">

					<button class="btn btn-outline-dark rounded-pill px-4 dropdown-toggle" type="button"
						data-bs-toggle="dropdown">

						<i class="bi bi-person me-2"></i>

						<span sec:authentication="name"></span>

					</button>

					<ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">

						<li sec:authorize="hasRole('ADMIN')">

							<a th:href="@{/admin}" class="dropdown-item py-2">

								<i class="bi bi-speedometer2 me-2"></i>

								Panel admin

							</a>

						</li>

						<li>
							<hr class="dropdown-divider">
						</li>

						<li>

							<form th:action="@{/logout}" method="post">

								<button type="submit" class="dropdown-item py-2">

									<i class="bi bi-box-arrow-right me-2"></i>

									Cerrar sesión

								</button>

							</form>

						</li>

					</ul>

				</div>

			</div>

		</div>

	</nav>

	<section class="py-5">

		<div class="container">

			<div class="d-flex justify-content-between align-items-center mb-4">

				<div>

					<h1 class="display-5 fw-bold mb-1">
						Reservas
					</h1>

					<p class="text-secondary mb-0">
						Gestiona las reservas de espacios.
					</p>

				</div>

				<a th:href="@{/reservas/nuevo}" class="btn btn-dark rounded-pill px-4">

					<i class="bi bi-plus-lg me-2"></i>

					Nueva reserva

				</a>

			</div>

			<div class="card border-0 shadow-sm rounded-4">

				<div class="card-body p-0">

					<div class="table-responsive">

						<table class="table table-hover align-middle mb-0">

							<thead class="table-light">

								<tr>

									<th class="ps-4 py-3">
										Codigo
									</th>

									<th>
										Reserva
									</th>

									<th>
										Fecha
									</th>

									<th>
										Horario
									</th>

									<th>
										Duracion
									</th>

									<th>
										Usuario
									</th>

									<th>
										Espacios
									</th>

									<th>
										Precio
									</th>

									<th class="text-end pe-4">
										Acciones
									</th>

								</tr>

							</thead>

							<tbody>

								<tr th:each="reserva : ${reservas}">

									<td class="ps-4" th:text="${reserva.codigo != null ? reserva.codigo : reserva.id}">
									</td>

									<td class="fw-semibold" th:text="${reserva.nombreReserva}">
									</td>

									<td th:text="${reserva.fecha}">
									</td>

									<td>

										<span th:text="${reserva.horaInicio}"></span>
										-
										<span th:text="${reserva.horaFin}"></span>

									</td>

									<td>
										<span th:text="${reserva.duracion}"></span> h
									</td>

									<td th:text="${reserva.usuario != null ? reserva.usuario.nombre : 'Sin usuario'}">
									</td>

									<td>

										<span th:if="${#lists.isEmpty(reserva.reservasEspacios)}">
											Sin espacio
										</span>

										<span th:each="re, iter : ${reserva.reservasEspacios}">

											<span th:text="${re.espacio.nombre}"></span>

											<span th:if="${!iter.last}">
												,
											</span>

										</span>

									</td>

									<td>

										<span th:text="${reserva.precioTotal}"></span>€

									</td>

									<td class="text-end pe-4">

										<a th:href="@{/reservas/editar/{id}(id=${reserva.id})}"
											class="btn btn-sm btn-outline-dark rounded-pill"
											sec:authorize="hasRole('ADMIN')">

											<i class="bi bi-pencil"></i>
											Editar

										</a>

										<a th:href="@{/reservas/borrar/{id}(id=${reserva.id})}"
											class="btn btn-sm btn-dark rounded-pill ms-2 js-confirm-delete"
											data-confirm-message="Seguro que quieres borrar esta reserva?"
											sec:authorize="hasRole('ADMIN')">

											<i class="bi bi-trash"></i>
											Borrar

										</a>

									</td>

								</tr>

							</tbody>

						</table>

					</div>

				</div>

			</div>

			<div class="mt-4">

				<a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill px-4"
					sec:authorize="hasRole('ADMIN')">

					Volver al panel

				</a>

			</div>

		</div>

	</section>

	<script src="/js/confirm-delete.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
