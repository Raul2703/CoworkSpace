<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reservas</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div class="container mt-5">

		<h1 class="mb-4">Lista de Reservas</h1>

		<a th:href="@{/reservas/nuevo}" class="btn btn-primary mb-3">Nueva Reserva</a>

		<table class="table table-striped table-bordered table-hover">

			<thead class="table-dark">
				<tr>
					<th>ID</th>
					<th>Nombre Reserva</th>
					<th>Fecha</th>
					<th>Hora Inicio</th>
					<th>Hora Fin</th>
					<th>Precio Total</th>
				</tr>
			</thead>

			<tbody>

				<tr th:each="reserva : ${reservas}">
					<td th:text="${reserva.id}"></td>
					<td th:text="${reserva.nombreReserva}"></td>
					<td th:text="${reserva.fecha}"></td>
					<td th:text="${reserva.horaInicio}"></td>
					<td th:text="${reserva.horaFin}"></td>
					<td th:text="${reserva.precioTotal}"></td>
				</tr>

			</tbody>

		</table>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
