<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reservas</title>

	<link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" rel="stylesheet">
</head>

<body>

	<div class="page">

		<header class="navbar navbar-expand-md navbar-dark bg-dark">
			<div class="container-xl">
				<a class="navbar-brand" href="#">CoworkSpace</a>

				<div class="navbar-nav">
					<a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
					<a class="nav-link" th:href="@{/espacios}">Espacios</a>
					<a class="nav-link" th:href="@{/reservas}">Reservas</a>
				</div>
			</div>
		</header>

		<div class="page-wrapper">

			<div class="page-header">
				<div class="container-xl">
					<div class="row align-items-center">
						<div class="col">
							<h2 class="page-title">Reservas</h2>
						</div>

						<div class="col-auto">
							<a th:href="@{/reservas/nuevo}" class="btn btn-primary">
								Nueva Reserva
							</a>
						</div>
					</div>
				</div>
			</div>

			<div class="page-body">
				<div class="container-xl">

					<div class="card">
						<div class="card-header">
							<h3 class="card-title">Listado de reservas</h3>
						</div>

						<div class="table-responsive">
							<table class="table table-vcenter card-table table-striped">

								<thead>
									<tr>
										<th>ID</th>
										<th>Nombre</th>
										<th>Fecha</th>
										<th>Hora inicio</th>
										<th>Hora fin</th>
										<th>Precio total</th>
										<th>Usuario</th>
										<th>Espacio</th>
										<th>Acciones</th>
									</tr>
								</thead>

								<tbody>
									<tr th:each="reserva : ${reservas}">
										<td th:text="${reserva.id}"></td>
										<td th:text="${reserva.nombreReserva}"></td>
										<td th:text="${reserva.fecha}"></td>
										<td th:text="${reserva.horaInicio}"></td>
										<td th:text="${reserva.horaFin}"></td>
										<td th:text="${reserva.precioTotal}"></td>

										<td
											th:text="${reserva.usuario != null ? reserva.usuario.nombre : 'Sin usuario'}">
										</td>
										<td
											th:text="${reserva.espacio != null ? reserva.espacio.nombre : 'Sin espacio'}">
										</td>

										<td>
											<a th:href="@{/reservas/editar/{id}(id=${reserva.id})}"
												class="btn btn-warning btn-sm">
												Editar
											</a>

											<a th:href="@{/reservas/borrar/{id}(id=${reserva.id})}"
												class="btn btn-danger btn-sm">
												Borrar
											</a>
										</td>
									</tr>
								</tbody>

							</table>
						</div>

					</div>

				</div>
			</div>

		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>

</body>

</html>
