<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Reservas')}"></th:block>
</head>

<body class="bg-light">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<th:block th:replace="~{fragments/layout :: alerts}"></th:block>

	<section class="py-5">

		<div class="container">

			<div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-4">

				<div>

					<h1 class="display-5 fw-bold mb-1">
						Reservas
					</h1>

					<p class="text-secondary mb-0">
						Gestiona las reservas de espacios.
					</p>

				</div>

				<a th:href="@{/reservas/nuevo}" class="btn btn-dark rounded-pill px-4">

					<i class="bi bi-plus-lg me-2"></i>

					Nueva reserva

				</a>

			</div>

			<div class="card border-0 shadow-sm rounded-4">

				<div class="card-body p-0">

					<div class="table-responsive">

						<table class="table table-hover align-middle mb-0">

							<thead class="table-light">

								<tr>

									<th class="ps-4 py-3">
										Reserva
									</th>

									<th>
										Fecha
									</th>

									<th>
										Horario
									</th>

									<th>
										Usuario
									</th>

									<th>
										Espacios
									</th>

									<th>
										Precio
									</th>

									<th>
										Estado
									</th>

									<th class="text-end pe-4">
										Acciones
									</th>

								</tr>

							</thead>

							<tbody>

								<tr th:each="reserva : ${reservas}">

									<td class="ps-4 fw-semibold" th:text="${reserva.nombreReserva}">
									</td>

									<td th:text="${reserva.fecha}">
									</td>

									<td>

										<span th:text="${reserva.horaInicio}"></span>
										-
										<span th:text="${reserva.horaFin}"></span>

									</td>

									<td th:text="${reserva.usuario != null ? reserva.usuario.nombre : 'Sin usuario'}">
									</td>

									<td>

										<span th:if="${#lists.isEmpty(reserva.reservasEspacios)}">
											Sin espacio
										</span>

										<span th:each="re, iter : ${reserva.reservasEspacios}">

											<span th:text="${re.espacio.nombre}"></span>

											<span th:if="${!iter.last}">
												,
											</span>

										</span>

									</td>

									<td>
										<span th:text="${reserva.precioTotal}"></span>&euro;
									</td>

									<td>

										<form th:action="@{/reservas/{id}/estado(id=${reserva.id})}" method="post"
											class="d-flex align-items-center gap-2">

											<select name="estado" class="form-select form-select-sm rounded-pill">

												<option th:each="estado : ${estadosReserva}" th:value="${estado}"
													th:selected="${estado == reserva.estadoActual}"
													th:text="${estado.texto}">
													Pendiente
												</option>

											</select>

											<button type="submit" class="btn btn-sm btn-outline-dark rounded-pill"
												title="Guardar estado">
												<i class="bi bi-check-lg"></i>
											</button>

										</form>

									</td>

									<td class="text-end pe-4">

										<a th:href="@{/reservas/editar/{id}(id=${reserva.id})}"
											class="btn btn-sm btn-outline-dark rounded-pill"
											sec:authorize="hasRole('ADMIN')">

											<i class="bi bi-pencil"></i>
											Editar

										</a>

										<a th:href="@{/reservas/borrar/{id}(id=${reserva.id})}"
											class="btn btn-sm btn-dark rounded-pill ms-2 js-confirm-delete"
											data-confirm-message="Seguro que quieres borrar esta reserva?"
											sec:authorize="hasRole('ADMIN')">

											<i class="bi bi-trash"></i>
											Borrar

										</a>

									</td>

								</tr>

							</tbody>

						</table>

					</div>

				</div>

			</div>

			<div class="mt-4">

				<a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill px-4"
					sec:authorize="hasRole('ADMIN')">
					Volver al panel
				</a>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<script src="/js/confirm-delete.js"></script>
	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
