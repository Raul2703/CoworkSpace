<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Usuarios')}"></th:block>
</head>

<body class="bg-light">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<section class="py-5">

		<div class="container">

			<div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-4">

				<div>

					<h1 class="display-5 fw-bold mb-1">
						Usuarios
					</h1>

					<p class="text-secondary mb-0">
						Gestiona los usuarios registrados.
					</p>

				</div>

				<a th:href="@{/usuarios/nuevo}" class="btn btn-dark rounded-pill px-4">

					<i class="bi bi-plus-lg me-2"></i>

					Nuevo usuario

				</a>

			</div>

			<div class="card border-0 shadow-sm rounded-4">

				<div class="card-body p-0">

					<div class="table-responsive">

						<table class="table table-hover align-middle mb-0">

							<thead class="table-light">

								<tr>

									<th class="ps-4 py-3">
										ID
									</th>

									<th>
										Nombre
									</th>

									<th>
										Email
									</th>

									<th>
										Tel&eacute;fono
									</th>

									<th class="text-end pe-4" sec:authorize="hasRole('ADMIN')">
										Acciones
									</th>

								</tr>

							</thead>

							<tbody>

								<tr th:each="usuario : ${usuarios}">

									<td class="ps-4" th:text="${usuario.id}">
									</td>

									<td class="fw-semibold" th:text="${usuario.nombre}">
									</td>

									<td th:text="${usuario.email}">
									</td>

									<td th:text="${usuario.telefono}">
									</td>

									<td class="text-end pe-4" sec:authorize="hasRole('ADMIN')">

										<a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}"
											class="btn btn-sm btn-outline-dark rounded-pill">

											<i class="bi bi-pencil"></i>
											Editar

										</a>

										<a th:href="@{/usuarios/borrar/{id}(id=${usuario.id})}"
											class="btn btn-sm btn-dark rounded-pill ms-2 js-confirm-delete"
											data-confirm-message="Seguro que quieres borrar este usuario?">

											<i class="bi bi-trash"></i>
											Borrar

										</a>

									</td>

								</tr>

							</tbody>

						</table>

					</div>

				</div>

			</div>

			<div class="mt-4" sec:authorize="hasRole('ADMIN')">

				<a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill px-4">
					Volver al panel
				</a>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<script src="/js/confirm-delete.js"></script>
	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
