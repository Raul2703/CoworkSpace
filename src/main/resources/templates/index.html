<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>CoworkSpace</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">

		<div class="container">

			<a class="navbar-brand fw-bold fs-2" th:href="@{/}">
				Cowork<span class="text-primary">Space</span>
			</a>

			<div class="ms-auto">

				<div sec:authorize="isAnonymous()">

					<a th:href="@{/login}" class="text-decoration-none text-dark">

						Iniciar sesión

					</a>

				</div>

				<div sec:authorize="isAuthenticated()">

					<div class="dropdown">

						<button class="btn btn-dark rounded-pill px-4 dropdown-toggle" type="button"
							data-bs-toggle="dropdown" aria-expanded="false">

							<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
								class="bi bi-person me-2" viewBox="0 0 16 16">

								<path
									d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z" />

							</svg>

							<span sec:authentication="name"></span>

						</button>

						<ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">

							<li>

								<form th:action="@{/logout}" method="post">

									<button type="submit" class="dropdown-item py-2">

										<i class="bi bi-box-arrow-right me-2"></i>

										Cerrar sesión

									</button>

								</form>

							</li>

						</ul>

					</div>

				</div>

			</div>

		</div>

	</nav>

	<section class="py-5">

		<div class="container">

			<div class="row justify-content-center text-center">

				<div class="col-lg-8">

					<h1 class="display-2 fw-bold mb-4">
						Reserva espacios de coworking modernos
					</h1>

					<p class="fs-3 text-secondary mb-5">
						Gestiona reservas, usuarios y espacios desde una plataforma sencilla y profesional.
					</p>

					<a th:href="@{/reservas/nuevo}" class="btn btn-primary btn-lg rounded-pill px-5">

						Reservar ahora

					</a>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
