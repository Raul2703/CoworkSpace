<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>CoworkSpace</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body style="font-family: 'Manrope', sans-serif; background-color: #ffffff;">

	<nav class="navbar navbar-expand-lg navbar-dark py-3 position-absolute top-0 start-0 w-100 z-3"
		style="background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(10px);">

		<div class="container">

			<a class="navbar-brand fw-bold fs-2 text-white text-decoration-none" th:href="@{/}">

				Cowork<span class="text-primary">Space</span>

			</a>

			<div class="collapse navbar-collapse">

				<ul class="navbar-nav mx-auto gap-4">

					<li class="nav-item">

						<a class="nav-link fw-medium text-white" th:href="@{/}">

							Inicio

						</a>

					</li>

					<li class="nav-item">

						<a class="nav-link fw-medium text-white" th:href="@{/espacios}">

							Espacios

						</a>

					</li>

					<li class="nav-item">

						<a class="nav-link fw-medium text-white" th:href="@{/reservas/nuevo}">

							Reservar

						</a>

					</li>

					<li class="nav-item" sec:authorize="hasRole('ADMIN')">

						<a class="nav-link fw-medium text-white" th:href="@{/reservas}">

							Reservas

						</a>

					</li>

					<li class="nav-item" sec:authorize="hasRole('ADMIN')">

						<a class="nav-link fw-medium text-white" th:href="@{/admin}">

							Admin

						</a>

					</li>

				</ul>

				<div class="d-flex align-items-center">

					<div sec:authorize="isAnonymous()">

						<a th:href="@{/login}" class="btn btn-light rounded-pill px-4 fw-semibold">

							Iniciar sesión

						</a>

					</div>

					<div sec:authorize="isAuthenticated()">

						<div class="dropdown">

							<button class="btn border-0 bg-transparent shadow-none p-0 dropdown-toggle text-white"
								type="button" data-bs-toggle="dropdown">

								<i class="bi bi-person me-1"></i>

								<span sec:authentication="name"></span>

							</button>

							<ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">

								<li sec:authorize="hasRole('ADMIN')">

									<a th:href="@{/admin}" class="dropdown-item py-2">

										<i class="bi bi-speedometer2 me-2"></i>

										Panel admin

									</a>

								</li>

								<li sec:authorize="hasRole('ADMIN')">

									<hr class="dropdown-divider">

								</li>

								<li>

									<form th:action="@{/logout}" method="post">

										<button type="submit" class="dropdown-item py-2">

											<i class="bi bi-box-arrow-right me-2"></i>

											Cerrar sesión

										</button>

									</form>

								</li>

							</ul>

						</div>

					</div>

				</div>

			</div>

		</div>

	</nav>

	<section class="position-relative overflow-hidden" style="height: 100vh;">

		<img src="/img/ofis.png" class="w-100 h-100 object-fit-cover position-absolute top-0 start-0"
			alt="Edificio de oficinas">

		<div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(0, 0, 0, 0.48);"></div>

		<div class="container position-relative h-100 d-flex align-items-center">

			<div class="text-white" style="max-width: 720px;">



				<h1 class="display-1 fw-bold mb-4">

					Espacios modernos para equipos profesionales

				</h1>

				<p class="fs-4 text-white-50 mb-5">

					Reserva oficinas privadas, salas de reuniones
					y espacios colaborativos desde una plataforma
					rápida y elegante.

				</p>

				<div class="d-flex flex-wrap gap-3">

					<a th:href="@{/reservas/nuevo}" class="btn btn-primary btn-lg rounded-pill px-5">

						Reservar ahora

					</a>

					<a th:href="@{/espacios}" class="btn btn-outline-light btn-lg rounded-pill px-5">

						Ver espacios

					</a>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
