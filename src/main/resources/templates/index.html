<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>CoworkSpace</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">

		<div class="container">

			<a class="navbar-brand fw-bold fs-2" th:href="@{/}">
				Cowork<span class="text-primary">Space</span>
			</a>

			<div class="ms-auto d-flex align-items-center gap-4">

				<a th:href="@{/login}" class="text-decoration-none text-dark">
					Iniciar sesión
				</a>

				<a th:href="@{/admin}" class="btn btn-dark rounded-pill px-4">
					Admin
				</a>

			</div>

		</div>

	</nav>

	<section class="py-5">

		<div class="container">

			<div class="row justify-content-center text-center">

				<div class="col-lg-8">

					<h1 class="display-2 fw-bold mb-4">
						Reserva espacios de coworking modernos
					</h1>

					<p class="fs-3 text-secondary mb-5">
						Gestiona reservas, usuarios y espacios desde una plataforma sencilla y profesional.
					</p>

					<a th:href="@{/reservas/nuevo}" class="btn btn-primary btn-lg rounded-pill px-5">

						Reservar ahora

					</a>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
