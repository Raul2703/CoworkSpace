<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nuevo Espacio</title>
</head>

<body>

	<h1>Nuevo Espacio</h1>

	<form th:action="@{/espacios/guardar}" th:object="${espacio}" method="post">

		<label>Nombre:</label>
		<input type="text" th:field="*{nombre}">

		<div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>

		<br><br>

		<label>Capacidad:</label>
		<input type="number" th:field="*{capacidad}">

		<div th:if="${#fields.hasErrors('capacidad')}" th:errors="*{capacidad}"></div>

		<br><br>

		<label>Precio:</label>
		<input type="number" step="0.01" th:field="*{precio}">

		<div th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>

		<br><br>

		<button type="submit">Guardar</button>

	</form>

	<br>

	<a th:href="@{/espacios}">Volver</a>

</body>

</html>
