<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Espacio')}"></th:block>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<section class="py-5">

		<div class="container">

			<div class="row justify-content-center">

				<div class="col-lg-7">

					<div class="card border-0 shadow-sm rounded-4">

						<div class="card-body p-5">

							<div class="text-center mb-5">

								<h1 class="fw-bold">
									Espacio
								</h1>

								<p class="text-secondary">
									A&ntilde;adir o editar espacio
								</p>

							</div>

							<form th:action="@{/espacios/guardar}" th:object="${espacio}" method="post">

								<input type="hidden" th:field="*{id}">

								<div class="mb-4">

									<label class="form-label">
										Nombre
									</label>

									<input type="text" th:field="*{nombre}" class="form-control rounded-3">

								</div>

								<div class="mb-4">

									<label class="form-label">
										Capacidad
									</label>

									<input type="number" th:field="*{capacidad}" class="form-control rounded-3">

								</div>

								<div class="mb-4">

									<label class="form-label">
										Precio por hora
									</label>

									<input type="number" step="0.01" th:field="*{precio}"
										class="form-control rounded-3">

								</div>

								<div class="d-flex gap-3 flex-wrap">

									<button type="submit" class="btn btn-dark rounded-pill px-4">

										<i class="bi bi-floppy me-2"></i>

										Guardar

									</button>

									<a th:href="@{/espacios}" class="btn btn-outline-secondary rounded-pill px-4">
										Cancelar
									</a>

								</div>

							</form>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
