<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Reservas')}"></th:block>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<section class="py-5">

		<div class="container">

			<div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-4">

				<div>

					<h1 class="display-5 fw-bold mb-1">
						Lista de reservas
					</h1>

					<p class="text-secondary mb-0">
						Consulta las reservas registradas.
					</p>

				</div>

				<a th:href="@{/reservas/nuevo}" class="btn btn-dark rounded-pill px-4">
					<i class="bi bi-plus-lg me-2"></i>
					Nueva reserva
				</a>

			</div>

			<div class="card border-0 shadow-sm rounded-4">

				<div class="card-body p-0">

					<div class="table-responsive">

						<table class="table table-hover align-middle mb-0">

							<thead class="table-light">

								<tr>

									<th class="ps-4 py-3">
										ID
									</th>

									<th>
										Nombre reserva
									</th>

									<th>
										Fecha
									</th>

									<th>
										Hora inicio
									</th>

									<th>
										Hora fin
									</th>

									<th>
										Precio total
									</th>

								</tr>

							</thead>

							<tbody>

								<tr th:each="reserva : ${reservas}">

									<td class="ps-4" th:text="${reserva.id}">
									</td>

									<td class="fw-semibold" th:text="${reserva.nombreReserva}">
									</td>

									<td th:text="${reserva.fecha}">
									</td>

									<td th:text="${reserva.horaInicio}">
									</td>

									<td th:text="${reserva.horaFin}">
									</td>

									<td>
										<span th:text="${reserva.precioTotal}"></span>&euro;
									</td>

								</tr>

							</tbody>

						</table>

					</div>

				</div>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
