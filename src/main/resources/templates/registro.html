<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Registro')}"></th:block>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<section class="py-5">

		<div class="container py-lg-4">

			<div class="row justify-content-center">

				<div class="col-lg-7">

					<div class="card border-0 shadow-sm rounded-4">

						<div class="card-body p-4 p-lg-5">

							<div class="text-center mb-4">

								<h1 class="fw-bold">
									Crear cuenta
								</h1>

								<p class="text-secondary mb-0">
									Registrate para poder hacer y consultar tus reservas.
								</p>

							</div>

							<form th:action="@{/registro}" th:object="${usuario}" method="post">

								<div class="mb-3">

									<label class="form-label fw-semibold">
										Usuario
									</label>

									<input type="text" th:field="*{nombre}" class="form-control rounded-3">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('nombre')}"
										th:errors="*{nombre}">
									</div>

								</div>

								<div class="mb-3">

									<label class="form-label fw-semibold">
										Email
									</label>

									<input type="email" th:field="*{email}" class="form-control rounded-3">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('email')}"
										th:errors="*{email}">
									</div>

								</div>

								<div class="mb-3">

									<label class="form-label fw-semibold">
										Telefono
									</label>

									<input type="text" th:field="*{telefono}" class="form-control rounded-3">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('telefono')}"
										th:errors="*{telefono}">
									</div>

								</div>

								<div class="mb-4">

									<label for="password" class="form-label fw-semibold">
										Contrase&ntilde;a
									</label>

									<input id="password" type="password" name="password" class="form-control rounded-3">

									<div class="text-danger small mt-2" th:if="${#fields.hasErrors('password')}"
										th:errors="*{password}">
									</div>

								</div>

								<div class="d-grid gap-3">

									<button type="submit" class="btn btn-dark rounded-pill py-3 fw-semibold">
										Crear cuenta
									</button>

									<a th:href="@{/login}" class="btn btn-outline-secondary rounded-pill py-3">
										Ya tengo cuenta
									</a>

								</div>

							</form>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<footer th:replace="~{fragments/layout :: footer}"></footer>

	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
