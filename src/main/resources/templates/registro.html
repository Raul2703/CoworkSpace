<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragments/layout :: headContent('Registro')}"></th:block>

	<style>
		::placeholder {
			color: rgba(255, 255, 255, 0.75) !important;
		}
	</style>
</head>

<body style="overflow-y: scroll;">

	<div class="position-relative min-vh-100" style="background-image: url('/img/fondoLogin.png');
            background-size: cover;
            background-position: center;">

		<div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(0,0,0,0.45);"></div>

		<nav class="navbar navbar-expand-lg navbar-dark position-absolute top-0 start-0 w-100 py-3 z-3"
			style="background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(10px);">

			<div class="container">

				<a class="navbar-brand fw-bold fs-2 text-white" th:href="@{/}">
					Cowork<span class="text-primary">Space</span>
				</a>

				<div class="ms-auto">

					<a th:href="@{/}" class="btn btn-light rounded-pill px-4 fw-semibold">
						Volver
					</a>

				</div>

			</div>

		</nav>

		<div class="container-fluid position-relative z-2" style="padding-top: 104px;">

			<div class="row py-4" style="min-height: calc(100vh - 104px);">

				<div class="col-lg-6"></div>

				<div class="col-lg-6 d-flex align-items-center justify-content-lg-start ps-lg-5">

					<div class="text-white p-4 p-lg-5" style="width: 100%;
                            max-width: 520px;
                            border: 1px solid rgba(255,255,255,0.2);
                            background: rgba(0,0,0,0.25);
                            backdrop-filter: blur(12px);
                            border-radius: 32px;">

						<h1 class="display-6 fw-bold mb-3">
							Crea tu cuenta
						</h1>

						<p class="text-white-50 fs-5 mb-4">
							Registrate para hacer reservas y consultar tus espacios.
						</p>

						<form th:action="@{/registro}" th:object="${usuario}" method="post">

							<div class="mb-3">

								<label class="form-label fw-semibold">
									Usuario
								</label>

								<input type="text" th:field="*{nombre}" class="form-control"
									placeholder="Introduce tu usuario" style="height: 52px;
                                          border-radius: 16px;
                                          background: rgba(255,255,255,0.08);
                                          border: 1px solid rgba(255,255,255,0.2);
                                          color: white;">

								<div class="text-danger small mt-2" th:if="${#fields.hasErrors('nombre')}"
									th:errors="*{nombre}">
								</div>

							</div>

							<div class="mb-3">

								<label class="form-label fw-semibold">
									Email
								</label>

								<input type="email" th:field="*{email}" class="form-control"
									placeholder="Introduce tu email" style="height: 52px;
                                          border-radius: 16px;
                                          background: rgba(255,255,255,0.08);
                                          border: 1px solid rgba(255,255,255,0.2);
                                          color: white;">

								<div class="text-danger small mt-2" th:if="${#fields.hasErrors('email')}"
									th:errors="*{email}">
								</div>

							</div>

							<div class="mb-3">

								<label class="form-label fw-semibold">
									Telefono
								</label>

								<input type="text" th:field="*{telefono}" class="form-control"
									placeholder="Introduce tu telefono" style="height: 52px;
                                          border-radius: 16px;
                                          background: rgba(255,255,255,0.08);
                                          border: 1px solid rgba(255,255,255,0.2);
                                          color: white;">

								<div class="text-danger small mt-2" th:if="${#fields.hasErrors('telefono')}"
									th:errors="*{telefono}">
								</div>

							</div>

							<div class="mb-4">

								<label for="password" class="form-label fw-semibold">
									Contrase&ntilde;a
								</label>

								<input id="password" type="password" name="password" class="form-control"
									placeholder="Introduce tu contrase&ntilde;a" style="height: 52px;
                                          border-radius: 16px;
                                          background: rgba(255,255,255,0.08);
                                          border: 1px solid rgba(255,255,255,0.2);
                                          color: white;">

								<div class="text-danger small mt-2" th:if="${#fields.hasErrors('password')}"
									th:errors="*{password}">
								</div>

							</div>

							<div class="d-grid mt-4">

								<button type="submit" class="btn btn-light rounded-pill py-3 fw-semibold fs-5">
									<i class="bi bi-person-plus me-2"></i>
									Crear cuenta
								</button>

							</div>

						</form>

						<div class="text-center mt-4">

							<p class="text-white-50 mb-0">
								&iquest;Ya tienes cuenta?

								<a th:href="@{/login}" class="text-white fw-semibold text-decoration-none">
									Inicia sesion
								</a>
							</p>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>

	<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>

</html>
