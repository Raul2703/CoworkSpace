<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Panel Admin</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
		<div class="container">

			<a class="navbar-brand fw-bold fs-2" th:href="@{/}">
				Cowork<span class="text-primary">Space</span>
			</a>

			<div class="ms-auto d-flex align-items-center gap-3">

				<a th:href="@{/}" class="text-decoration-none text-dark">
					Web pública
				</a>

				<form th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-outline-dark rounded-pill px-4">
						Cerrar sesión
					</button>
				</form>

			</div>

		</div>
	</nav>

	<section class="py-5">
		<div class="container">

			<div class="text-center mb-5">
				<h1 class="display-4 fw-bold">Panel de administración</h1>
				<p class="fs-5 text-secondary">Gestiona usuarios, espacios y reservas.</p>
			</div>

			<div class="row g-4">

				<div class="col-md-4">
					<div class="card border-0 shadow-sm rounded-4 h-100">
						<div class="card-body p-4">
							<div class="fs-1 text-primary mb-4">
								<i class="bi bi-people"></i>
							</div>

							<h3 class="fw-bold">Usuarios</h3>

							<p class="text-secondary">
								Administra usuarios registrados.
							</p>

							<a th:href="@{/usuarios}" class="btn btn-primary rounded-pill px-4">
								Gestionar
							</a>
						</div>
					</div>
				</div>

				<div class="col-md-4">
					<div class="card border-0 shadow-sm rounded-4 h-100">
						<div class="card-body p-4">
							<div class="fs-1 text-success mb-4">
								<i class="bi bi-building"></i>
							</div>

							<h3 class="fw-bold">Espacios</h3>

							<p class="text-secondary">
								Controla los espacios disponibles.
							</p>

							<a th:href="@{/espacios}" class="btn btn-success rounded-pill px-4">
								Gestionar
							</a>
						</div>
					</div>
				</div>

				<div class="col-md-4">
					<div class="card border-0 shadow-sm rounded-4 h-100">
						<div class="card-body p-4">
							<div class="fs-1 text-dark mb-4">
								<i class="bi bi-calendar-check"></i>
							</div>

							<h3 class="fw-bold">Reservas</h3>

							<p class="text-secondary">
								Gestiona reservas y horarios.
							</p>

							<a th:href="@{/reservas}" class="btn btn-dark rounded-pill px-4">
								Gestionar
							</a>
						</div>
					</div>
				</div>

			</div>

		</div>
	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
