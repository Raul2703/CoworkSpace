<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Panel Admin</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">

		<div class="container">

			<a class="navbar-brand fw-bold fs-2" th:href="@{/}">

				Cowork<span class="text-primary">Space</span>

			</a>

			<div class="dropdown">

				<button class="btn border-0 bg-transparent shadow-none p-0 dropdown-toggle" type="button"
					data-bs-toggle="dropdown">

					<i class="bi bi-person me-1"></i>

					<span sec:authentication="name"></span>

				</button>

				<ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">

					<li>

						<a th:href="@{/}" class="dropdown-item py-2">

							<i class="bi bi-house me-2"></i>

							Inicio

						</a>

					</li>

					<li>
						<hr class="dropdown-divider">
					</li>

					<li>

						<form th:action="@{/logout}" method="post">

							<button type="submit" class="dropdown-item py-2">

								<i class="bi bi-box-arrow-right me-2"></i>

								Cerrar sesión

							</button>

						</form>

					</li>

				</ul>

			</div>

		</div>

	</nav>

	<section class="py-5">

		<div class="container">

			<div class="mb-5">

				<h1 class="display-4 fw-bold">
					Panel de administración
				</h1>

				<p class="fs-5 text-secondary">
					Gestiona usuarios, reservas y espacios desde un único lugar.
				</p>

			</div>

			<div class="row g-4">

				<div class="col-lg-4">

					<div class="card border-0 shadow-sm rounded-4 h-100">

						<div class="card-body p-4">

							<div class="d-flex justify-content-between align-items-center mb-4">

								<div>

									<h5 class="text-secondary">
										Usuarios
									</h5>

									<h2 class="fw-bold" th:text="${totalUsuarios}">
										0
									</h2>

								</div>

								<div class="bg-primary bg-opacity-10 rounded-circle p-3">

									<i class="bi bi-people fs-2 text-primary"></i>

								</div>

							</div>

							<div class="d-grid gap-2">

								<a th:href="@{/usuarios}" class="btn btn-dark rounded-pill">

									Ver usuarios

								</a>

								<a th:href="@{/usuarios/nuevo}" class="btn btn-outline-dark rounded-pill">

									Nuevo usuario

								</a>

							</div>

						</div>

					</div>

				</div>

				<div class="col-lg-4">

					<div class="card border-0 shadow-sm rounded-4 h-100">

						<div class="card-body p-4">

							<div class="d-flex justify-content-between align-items-center mb-4">

								<div>

									<h5 class="text-secondary">
										Espacios
									</h5>

									<h2 class="fw-bold" th:text="${totalEspacios}">
										0
									</h2>

								</div>

								<div class="bg-success bg-opacity-10 rounded-circle p-3">

									<i class="bi bi-building fs-2 text-success"></i>

								</div>

							</div>

							<div class="d-grid gap-2">

								<a th:href="@{/espacios}" class="btn btn-dark rounded-pill">

									Ver espacios

								</a>

								<a th:href="@{/espacios/nuevo}" class="btn btn-outline-dark rounded-pill">

									Nuevo espacio

								</a>

							</div>

						</div>

					</div>

				</div>

				<div class="col-lg-4">

					<div class="card border-0 shadow-sm rounded-4 h-100">

						<div class="card-body p-4">

							<div class="d-flex justify-content-between align-items-center mb-4">

								<div>

									<h5 class="text-secondary">
										Reservas
									</h5>

									<h2 class="fw-bold" th:text="${totalReservas}">
										0
									</h2>

								</div>

								<div class="bg-warning bg-opacity-10 rounded-circle p-3">

									<i class="bi bi-calendar-check fs-2 text-warning"></i>

								</div>

							</div>

							<div class="d-grid gap-2">

								<a th:href="@{/reservas}" class="btn btn-dark rounded-pill">

									Ver reservas

								</a>

								<a th:href="@{/reservas/nuevo}" class="btn btn-outline-dark rounded-pill">

									Nueva reserva

								</a>

							</div>

						</div>

					</div>

				</div>

			</div>

			<div class="row mt-4">

				<div class="col-lg-4">

					<div class="card border-0 shadow-sm rounded-4">

						<div class="card-body p-4 d-flex justify-content-between align-items-center">

							<div>

								<p class="text-secondary mb-1">
									Ingresos totales
								</p>

								<h4 class="fw-bold mb-0">

									<span th:text="${ingresosTotales}">
										0
									</span>€

								</h4>

							</div>

							<div class="bg-success bg-opacity-10 rounded-circle p-3">

								<i class="bi bi-currency-euro fs-4 text-success"></i>

							</div>

						</div>

					</div>

				</div>

			</div>

			<div class="row mt-4">

				<div class="col-lg-6">

					<div class="card border-0 shadow-sm rounded-4 h-100">

						<div class="card-body p-4">

							<h4 class="fw-bold mb-4">
								Espacios más reservados
							</h4>

							<div class="table-responsive">

								<table class="table align-middle">

									<thead>

										<tr>

											<th>Espacio</th>

											<th>Reservas</th>

										</tr>

									</thead>

									<tbody>

										<tr th:each="dato : ${espaciosMasReservados}">

											<td th:text="${dato[0]}"></td>

											<td th:text="${dato[1]}"></td>

										</tr>

									</tbody>

								</table>

							</div>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
