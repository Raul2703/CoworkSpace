<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Panel Admin</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
</head>

<body class="bg-light" style="font-family: 'Manrope', sans-serif;">

	<div class="container-fluid">

		<div class="row min-vh-100">

			<aside class="col-md-3 col-lg-2 bg-white border-end p-4">

				<a class="navbar-brand fw-bold fs-4 d-block mb-5" th:href="@{/}">

					Cowork<span class="text-primary">Space</span>

				</a>

				<nav class="nav flex-column gap-2">

					<a th:href="@{/admin}" class="nav-link active bg-primary-subtle text-primary rounded-3 fw-semibold">

						<i class="bi bi-speedometer2 me-2"></i>

						Dashboard

					</a>

					<a th:href="@{/reservas}" class="nav-link text-dark rounded-3">

						<i class="bi bi-calendar-check me-2"></i>

						Reservas

					</a>

					<a th:href="@{/espacios}" class="nav-link text-dark rounded-3">

						<i class="bi bi-building me-2"></i>

						Espacios

					</a>

					<a th:href="@{/usuarios}" class="nav-link text-dark rounded-3">

						<i class="bi bi-people me-2"></i>

						Usuarios

					</a>

				</nav>

			</aside>

			<main class="col-md-9 col-lg-10 p-0">

				<header class="bg-white border-bottom px-5 py-3 d-flex justify-content-end align-items-center">

					<div class="dropdown">

						<button class="btn btn-light rounded-pill px-4 dropdown-toggle" type="button"
							data-bs-toggle="dropdown">

							<i class="bi bi-person-circle me-2"></i>

							<span sec:authentication="name"></span>

						</button>

						<ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4">

							<li>

								<form th:action="@{/logout}" method="post">

									<button type="submit" class="dropdown-item py-2">

										<i class="bi bi-box-arrow-right me-2"></i>

										Cerrar sesión

									</button>

								</form>

							</li>

						</ul>

					</div>

				</header>

				<section class="p-5">

					<div class="mb-4">

						<h1 class="fw-bold mb-1">
							Dashboard
						</h1>

						<p class="text-secondary mb-0">
							Resumen general del sistema.
						</p>

					</div>

					<div class="row g-4 mb-5">

						<div class="col-md-4">

							<div class="card border-0 shadow-sm rounded-4">

								<div class="card-body p-4">

									<p class="text-secondary mb-2">
										Usuarios
									</p>

									<h2 class="fw-bold" th:text="${totalUsuarios}">
										0
									</h2>

								</div>

							</div>

						</div>

						<div class="col-md-4">

							<div class="card border-0 shadow-sm rounded-4">

								<div class="card-body p-4">

									<p class="text-secondary mb-2">
										Reservas
									</p>

									<h2 class="fw-bold" th:text="${totalReservas}">
										0
									</h2>

								</div>

							</div>

						</div>

						<div class="col-md-4">

							<div class="card border-0 shadow-sm rounded-4">

								<div class="card-body p-4">

									<p class="text-secondary mb-2">
										Ingresos
									</p>

									<h2 class="fw-bold">

										<span th:text="${ingresosTotales}"></span>€

									</h2>

								</div>

							</div>

						</div>

					</div>

				</section>

			</main>

		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
